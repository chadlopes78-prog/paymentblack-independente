[build]
  command = "npm install --legacy-peer-deps && npm run build:netlify"
  publish = "dist-spa"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--legacy-peer-deps"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  # Netlify's default is 10s. api-payment.ts can legitimately wait on the
  # customer entering their PIN before E2Payments answers — raise the
  # ceiling so the function's own 22s internal timeout (see api-payment.ts)
  # gets a chance to return a clean response instead of Netlify killing the
  # connection first and leaving the client with no answer at all.
  timeout = 26

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Cache static assets agressivamente (JS/CSS com hash no nome)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache imagens e ícones
[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/*.ico"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# Todas as rotas HTML sem cache (SPA deve sempre buscar a versão mais recente)
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Service worker sem cache
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
