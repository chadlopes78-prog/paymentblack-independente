<!DOCTYPE html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />
    <link rel="icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/logo-192.png" />
    <link rel="manifest" href="/manifest.json" />
    <title>Paymentblack Mozambique | Plataforma de Pagamentos</title>
    <meta name="description" content="A plataforma de pagamentos e checkout mais completa para Moçambique. Aceite M-Pesa e e-Mola." />
    <!-- Preconnect para Supabase (checkout e auth) -->
    <link rel="preconnect" href="https://wdhiralaekjeucbxudyf.supabase.co" />
    <!-- Preconnect para gateway de pagamento -->
    <link rel="preconnect" href="https://payflax.site" />
    <!-- Script de tema (evita flash de tela branca em modo escuro) -->
    <script>
      (function(){try{var t=localStorage.getItem('pb-theme');if(!t){t=window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light';}if(t==='dark'){document.documentElement.classList.add('dark');}document.documentElement.style.colorScheme=t;}catch(e){}})();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main-spa.tsx"></script>
  </body>
</html>
